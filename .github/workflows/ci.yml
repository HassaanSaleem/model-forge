name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      # The torch stack is not installed in CI: the summarizer tests run against
      # stub models, so only the serving layer (fastapi) is needed beyond churn+dev.
      - name: Install
        run: pip install -e ".[churn,dev]" fastapi
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -q
